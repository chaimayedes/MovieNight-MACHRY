syntax = "proto3";
package api_consumer;

service ApiConsumerService {
  rpc FetchMoviesByGenre (MoodRequest)    returns (MovieList);
  rpc FetchCatalog        (CatalogRequest) returns (CatalogResponse);
  rpc FetchMovie          (MovieIdRequest) returns (MovieDetailed);
  rpc SearchMovies        (SearchRequest)  returns (MovieList);
}

message MoodRequest    { string mood     = 1; }
message CatalogRequest { int32  page     = 1; int32 limit = 2; }
message MovieIdRequest { int32  movie_id = 1; }
message SearchRequest  { string query    = 1; }

message Movie {
  int32  id           = 1;
  string title        = 2;
  string poster_path  = 3;
  string release_date = 4;
}

message MovieList { repeated Movie movies = 1; }

message CatalogResponse {
  int32          total_results = 1;
  repeated Movie movies        = 2;
}

message MovieDetailed {
  int32           id           = 1;
  string          title        = 2;
  string          overview     = 3;
  int32           duration     = 4;
  string          poster_path  = 5;
  repeated string genres       = 6;
  repeated string casting      = 7;
  string          release_date = 8;
}
