version: '3.8'

services:

  # ----------------------------------------------------
  # PUBLIC API — seul service exposé en HTTP (port 8000)
  # ----------------------------------------------------
  public-api:
    build:
      context: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ../proto:/proto
    environment:
      - BUSINESS_LOGIC_HOST=business-logic:50051
    depends_on:
      - business-logic

  # ----------------------------------------------------
  # BUSINESS LOGIC — serveur gRPC interne
  # ----------------------------------------------------
  business-logic:
    build:
      context: ../business-logic
    ports:
      - "8001:50051"   # optionnel : debug depuis localhost:8001
    volumes:
      - ../business-logic:/app
      - ../proto:/proto
    environment:
      - API_CONSUMER_HOST=api-consumer:50051
      - DATASTORE_HOST=datastore:50051
    depends_on:
      - api-consumer
      - datastore

  # ----------------------------------------------------
  # API CONSUMER — pont vers TheMovieDB, serveur gRPC
  # ----------------------------------------------------
  api-consumer:
    build:
      context: ../api-consumer
    ports:
      - "8002:50051"   # optionnel : debug depuis localhost:8002
    volumes:
      - ../api-consumer:/app
      - ../proto:/proto
    environment:
      - TMDB_API_KEY=fdee8faa6560e0c0388c2e30ea9f93b5
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  # ----------------------------------------------------
  # DATASTORE — SQLite via serveur gRPC
  # ----------------------------------------------------
  datastore:
    build:
      context: ../datastore
    ports:
      - "8003:50051"   # optionnel : debug depuis localhost:8003
    volumes:
      - ../datastore:/app
      - ../proto:/proto
      - movie_db_data:/data
    environment:
      - DATABASE_URL=sqlite:////data/movie_night.db

  # ----------------------------------------------------
  # REDIS — cache partagé
  # ----------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  movie_db_data:
