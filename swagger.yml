openapi: 3.0.3
info:
  title: Movie Night API — Public Gateway
  description: API publique pour l'application de recommandation de films "Movie Night" basée sur l'humeur et le groupe.
  version: 1.1.0
servers:
  - url: http://localhost:8000
    description: Serveur de développement local (Public API)

security: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    MovieMinimal:
      type: object
      properties:
        id:
          type: integer
          example: 550
        title:
          type: string
          example: "Fight Club"
        poster_path:
          type: string
          example: "/pB8BM7pdSp6B6Ih7QZ49Yw4v6as.jpg"
        release_date:
          type: string
          example: "1999-10-15"

    MovieDetailed:
      type: object
      properties:
        id:
          type: integer
          example: 550
        title:
          type: string
          example: "Fight Club"
        overview:
          type: string
          example: "A ticking-time-bomb insomniac and a slippery soap salesman..."
        duration:
          type: integer
          description: Durée en minutes
          example: 139
        poster_path:
          type: string
          example: "/pB8BM7pdSp6B6Ih7QZ49Yw4v6as.jpg"
        release_date:
          type: string
          example: "1999-10-15"
        genres:
          type: array
          items:
            type: string
          example: ["Drama", "Thriller"]
        casting:
          type: array
          items:
            type: string
          example: ["Brad Pitt", "Edward Norton", "Helena Bonham Carter"]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT Bearer token (valide 72 h)
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        user:
          type: object
          properties:
            id:
              type: integer
              example: 42
            username:
              type: string
              example: "alice"

paths:

  # ----------------------------------------------------
  # AUTH
  # ----------------------------------------------------
  /api/v1/auth/register:
    post:
      summary: Créer un compte
      description: Crée un nouvel utilisateur et retourne un JWT.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: "alice"
                password:
                  type: string
                  example: "s3cr3t"
      responses:
        '201':
          description: Compte créé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Nom d'utilisateur déjà pris

  /api/v1/auth/login:
    post:
      summary: Se connecter
      description: Authentifie l'utilisateur et retourne un JWT.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: "alice"
                password:
                  type: string
                  example: "s3cr3t"
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Identifiants invalides

  # ----------------------------------------------------
  # RECOMMENDATION
  # ----------------------------------------------------
  /api/v1/recommendation:
    get:
      summary: Obtenir un top 3 de films recommandés
      description: Recommande 3 films triés par pertinence selon l'humeur de l'utilisateur et la composition du groupe.
      security: []
      parameters:
        - name: mood
          in: query
          required: true
          description: L'humeur actuelle pour le film
          schema:
            type: string
            enum: [chill, scary, laugh, cry, action]
        - name: group
          in: query
          required: true
          description: Avec qui regardez-vous le film ?
          schema:
            type: string
            enum: [solo, couple, friends, family]
      responses:
        '200':
          description: Top 3 des films trouvé avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MovieMinimal'
                minItems: 3
                maxItems: 3
        '400':
          description: Paramètres manquants ou invalides

  # ----------------------------------------------------
  # CATALOGUE
  # ----------------------------------------------------
  /api/v1/movies:
    get:
      summary: Récupérer le catalogue général
      description: Liste tous les films disponibles avec pagination.
      security: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Catalogue récupéré avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_results:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MovieMinimal'

  # ----------------------------------------------------
  # DÉTAIL D'UN FILM
  # ----------------------------------------------------
  /api/v1/movies/{id}:
    get:
      summary: Récupérer les détails complets d'un film
      security: []
      parameters:
        - name: id
          in: path
          required: true
          description: TMDB ID du film
          schema:
            type: integer
      responses:
        '200':
          description: Détails du film récupérés
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieDetailed'
        '404':
          description: Film introuvable

  # ----------------------------------------------------
  # NOTER UN FILM  (JWT requis)
  # ----------------------------------------------------
  /api/v1/movies/{id}/rate:
    post:
      summary: Noter un film
      description: |
        Attribue une note à un film. L'identifiant de l'utilisateur est extrait
        automatiquement du token JWT — il n'est **pas** à fournir dans le body.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: TMDB ID du film à noter
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 5
                  example: 4.5
      responses:
        '201':
          description: Note enregistrée avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Rating registered for movie 550"
        '400':
          description: Note invalide
        '401':
          description: Token manquant ou invalide

  # ----------------------------------------------------
  # RECHERCHE
  # ----------------------------------------------------
  /api/v1/search:
    get:
      summary: Rechercher des films
      security: []
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
        - name: genre
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Résultats de recherche
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MovieMinimal'

  # ----------------------------------------------------
  # WATCHLIST  (JWT requis)
  # ----------------------------------------------------
  /api/v1/watchlist:
    get:
      summary: Récupérer la watchlist
      description: Retourne la liste des films sauvegardés par l'utilisateur connecté.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Watchlist récupérée
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MovieMinimal'
        '401':
          description: Token manquant ou invalide
    post:
      summary: Ajouter un film à la watchlist
      description: Ajoute un film à la watchlist de l'utilisateur connecté.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [movie_id]
              properties:
                movie_id:
                  type: integer
                  example: 550
      responses:
        '201':
          description: Film ajouté à la watchlist
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Movie added to watchlist"
        '401':
          description: Token manquant ou invalide
        '409':
          description: Film déjà dans la watchlist
